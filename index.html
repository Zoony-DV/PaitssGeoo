      <h1 class="hero-title" data-ka="ბავშვთა ანესთეზიოლოგია და ინტენსიური თერაპია" data-en="Pediatric Anesthesiology and Intensive Therapy"></h1>
      <p class="hero-sub"
         data-ka="პედიატრიული ანესთეზიისა და ინტენსიური თერაპიის ასოციაცია არის პროფესიული ორგანიზაცია, რომელიც აერთიანებს სპეციალისტებს ბავშვთა ანესთეზიოლოგიისა და კრიტიკული მედიცინის სფეროში. ასოციაციის მთავარი მიზანია პაციენტთა უსაფრთხოების, თანამედროვე კლინიკური პრაქტიკისა და უწყვეტი პროფესიული განვითარების ხელშეწყობა. ჩვენი საქმიანობა მოიცავს განათლებას, სამეცნიერო კვლევების მხარდაჭერას, გამოცდილების გაზიარებასა და საერთაშორისო თანამშრომლობის გაღრმავებას. გვჯერა, რომ ცოდნისა და ერთობლივი ძალისხმევის მეშვეობით შესაძლებელია ბავშვებისთვის უფრო ხარისხიანი და უსაფრთხო სამედიცინო დახმარების უზრუნველყოფა."
         data-en="The Pediatric Anesthesia and Intensive Care Association is a professional organization that brings together specialists in the fields of pediatric anesthesiology and critical care medicine. The Association's primary mission is to promote patient safety, modern clinical practice, and continuous professional development. Our activities include education, support for scientific research, the exchange of knowledge and experience, and the strengthening of international collaboration. We believe that through shared expertise and collective effort, it is possible to provide children with safer, higher-quality medical care.
"></p>
